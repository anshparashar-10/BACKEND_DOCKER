version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5433:5432"   # 5433 on your host → 5432 inside the container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: AP10
      POSTGRES_DB: customer_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-server:
    build: ./mock-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline-service:
    build: ./pipeline-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:AP10@postgres:5432/customer_db

volumes:
  postgres_data:
